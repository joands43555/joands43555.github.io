<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Lado Oscuro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 0 40px rgba(255,0,0,0.15);
    }
    .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 15px;
    }
    .tag {
      color: #ff2222;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .title {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }
    .btn {
      display: block;
      background: #ff2222;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 16px 20px;
      border-radius: 50px;
      text-decoration: none;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .btn:hover { background: #cc0000; }
    .disclaimer {
      color: #555;
      font-size: 0.78rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🏘</span>
    <div class="tag">El Lado Oscuro</div>
    <div class="title">EL LADO OSCURO</div>
    <div class="subtitle">Contenido exclusivo para ti</div>
    <a class="btn" href="https://t.me/ElLadoOscuro01">
      ✈️ ENTRAR AL CANAL
    </a>
    <div class="disclaimer">Contenido +18 · al entrar confirmas ser mayor de edad</div>
  </div>
</body>
</html>
